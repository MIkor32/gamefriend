services:
  app:
    build: .
    container_name: gamefriend_app
    restart: unless-stopped
    environment:
      DB_DSN: ${DB_DSN:-mysql:host=127.0.0.1;port=3306;dbname=czz;charset=utf8mb4}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-}
    volumes:
      - ./:/var/www/html
    networks:
      - gamefriend_net

  web:
    image: nginx:1.27-alpine
    container_name: gamefriend_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - gamefriend_net

networks:
  gamefriend_net:
    driver: bridge
