services:
  app:
    build: .
    container_name: gamefriend_app
    restart: unless-stopped
    environment:
      DB_DSN: mysql:host=db;dbname=czz;charset=utf8mb4
      DB_USER: gamefriend
      DB_PASS: gamefriend123
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gamefriend_net

  web:
    image: nginx:1.27-alpine
    container_name: gamefriend_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - gamefriend_net

  db:
    image: mysql:8.0
    container_name: gamefriend_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: czz
      MYSQL_USER: gamefriend
      MYSQL_PASSWORD: gamefriend123
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "33066:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - gamefriend_net

volumes:
  db_data:

networks:
  gamefriend_net:
    driver: bridge
